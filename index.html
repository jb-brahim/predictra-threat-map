<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Threat Map — Global Cyber Intelligence</title>
    <meta
      name="description"
      content="Real-time global cyber threat intelligence dashboard with 3D visualization of live attack events."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2285%22>🛡️</text></svg>"
    />
    <style>
      /* Critical loading styles */
      body {
        margin: 0;
        background: #05080f;
      }
      #root {
        width: 100vw;
        height: 100vh;
      }
      .loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #05080f;
        z-index: 9999;
        font-family: "Orbitron", system-ui, sans-serif;
        color: #00d1ff;
        font-size: 14px;
        letter-spacing: 4px;
      }
      .loading-screen::after {
        content: "INITIALIZING";
        animation: blink 1.5s infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
